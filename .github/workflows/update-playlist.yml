name: Update Playlist and Validate Streams

on:
  # Ejecución manual
  workflow_dispatch:

  # Cada 6 horas
  schedule:
    - cron: '0 */6 * * *'

  # Al modificar archivos relevantes
  push:
    branches:
      - main
    paths:
      - 'data/channels.json'
      - 'data/wanted_channels.json'
      - 'data/channel_overrides.json'
      - 'scripts/**'
      - 'logos/**'

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    # Evitar ejecución en commits automáticos del bot
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Import channels from IPTV-org
        run: python scripts/import_iptv_org.py

      - name: Validate all streams
        run: python scripts/validate_streams.py
        continue-on-error: true

      - name: Generate playlist
        run: python scripts/generate_playlist.py

      - name: Run tests
        run: python scripts/test_import.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet index.m3u data/imported_channels.json data/discovered_candidates.json reports/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.m3u data/imported_channels.json data/discovered_candidates.json reports/
          git commit -m "chore: update playlist, discovered candidates and reports"
          git push
